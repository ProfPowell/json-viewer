name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Stage _site
        run: |
          mkdir -p _site/src _site/docs _site/dist _site/test
          # All real pages live under /docs/ so the relative `../src/json-viewer.js`
          # imports resolve correctly. The root index.html is a thin redirect.
          cp -R docs/. _site/docs/
          # Ship the BUILT bundle at the two paths consumers can reference.
          cp dist/json-viewer.js _site/src/json-viewer.js
          cp dist/json-viewer.js _site/dist/json-viewer.js
          # Fixtures used by the demos page's `src=` attribute
          cp -R test/fixtures _site/test/fixtures
          # Root redirect to /docs/ — keeps the published URL clean
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>json-viewer</title>
          <meta http-equiv="refresh" content="0; url=./docs/">
          <link rel="canonical" href="./docs/">
          <p>Redirecting to <a href="./docs/">/docs/</a>…</p>
          HTML
          # 404 page also redirects to the docs landing
          cp _site/index.html _site/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
