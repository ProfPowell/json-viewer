name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Stage _site
        run: |
          mkdir -p _site/src _site/docs
          # Landing page at site root — index.html is self-contained
          cp docs/index.html _site/index.html
          # Mirror docs/* under /docs so links from index work too
          cp -R docs/. _site/docs/
          # Make src/json-viewer.js reachable so docs/demos.html's
          # `import '../src/json-viewer.js'` resolves on Pages.
          # We ship the BUILT bundle under src/ so consumers see what npm ships.
          cp dist/json-viewer.js _site/src/json-viewer.js
          # Also expose dist/ for anyone who wants to script-tag it
          mkdir -p _site/dist
          cp dist/json-viewer.js _site/dist/json-viewer.js
          # 404 page falls back to landing
          cp docs/index.html _site/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
