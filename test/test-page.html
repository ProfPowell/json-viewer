<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>json-viewer test page</title>
  <script type="module" src="/src/json-viewer.js"></script>
</head>
<body>
  <h1>json-viewer test harness</h1>
  <json-viewer id="basic" expanded="2"></json-viewer>
  <script type="module">
    const el = document.getElementById('basic');
    el.data = { name: 'Ada', skills: ['math', 'engineering'], active: true, n: null };
  </script>
  <json-viewer id="map-viewer" expanded="3"></json-viewer>
  <script type="module">
    const mapEl = document.getElementById('map-viewer');
    const objKey = { id: 'k1', label: 'first' };
    const m = new Map();
    m.set(objKey, { tags: ['a', 'b'] });
    m.set('plain', 99);
    mapEl.data = m;
    window.__mapEl = mapEl;
    window.__objKey = objKey;
  </script>
  <json-viewer id="search-viewer" expanded="1"></json-viewer>
  <script type="module">
    const sv = document.getElementById('search-viewer');
    sv.data = {
      users: [
        { id: 1, name: 'Ada', email: 'ada@example.com' },
        { id: 2, name: 'Linus', email: 'linus@example.com' }
      ],
      config: { theme: 'dark', adaMode: true },
      notes: 'nothing about ada here either'
    };
    window.__sv = sv;
  </script>

  <!-- Loaded-from-fixture viewer used by the fixture-driven render tests -->
  <json-viewer id="api-viewer" src="/test/fixtures/api.json" expanded="1" show-types></json-viewer>

  <!-- Deep tree for lazy-expansion test -->
  <json-viewer id="nested-viewer" src="/test/fixtures/nested.json" expanded="1"></json-viewer>

  <!-- Glob expansion harness with everything pre-rendered (expanded=3 so children of users render) -->
  <json-viewer id="glob-viewer" expanded="3"></json-viewer>
  <script type="module">
    const gv = document.getElementById('glob-viewer');
    gv.data = {
      users: [
        { id: 1, name: 'Ada' },
        { id: 2, name: 'Linus' }
      ]
    };
    window.__gv = gv;
  </script>

  <!-- Viewer wired for event capture; tests trigger clicks then read window.__events -->
  <json-viewer id="event-viewer" expanded="2"></json-viewer>
  <script type="module">
    const ev = document.getElementById('event-viewer');
    ev.data = { greeting: 'hello', count: 42 };
    window.__events = []
    ev.addEventListener('json-viewer:keyclick', (e) => window.__events.push({ kind: 'keyclick', detail: e.detail }))
    ev.addEventListener('json-viewer:valueclick', (e) => window.__events.push({ kind: 'valueclick', detail: e.detail }))
    window.__eventEl = ev
  </script>
</body>
</html>
